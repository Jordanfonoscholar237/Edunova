{% extends "base.html" %}
{% block title %}Login | EDUNOVA{% endblock %}
{% block content %}
<section class="page-hero"><div class="container"><p class="eyebrow">Login</p><h1>Welcome back.</h1><p>Access your student dashboard.</p></div></section>
<section><div class="container auth-small card">
<form method="post">
  <label>Email</label><input type="email" name="email" required>
  <label>Password</label><input type="password" name="password" required>
  <button class="btn btn-primary" type="submit">Login</button>
  <p>New student? <a href="{{ url_for('register') }}">Create an account</a>.</p>
</form>
</div></section>
{% endblock %}
